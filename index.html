<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Робочий календар Сергія</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      'https://unyztaiglminylhbinsy.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXp0YWlnbG1pbnlsaGJpbnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjUwMzQsImV4cCI6MjA4OTEwMTAzNH0.aD-HFhE9XnPM_V0TBz7UJ_7lBGszSj0olz1CSkmcw_k'
    );

    let calendar;

    async function fetchAndRender() {
      const { data, error } = await supabase
        .from('work_days')
        .select('date')
        .order('date');

      if (error) {
        console.error(error);
        document.getElementById('stats').innerHTML = `<p class="text-red-500">Помилка завантаження 😔</p>`;
        return;
      }

      const days = data.map(d => d.date);
      const totalDays = days.length;

      // Статистика по місяцях
      const monthly = {};
      days.forEach(date => {
        const month = date.substring(0, 7); // "2026-03"
        monthly[month] = (monthly[month] || 0) + 1;
      });

      let monthlyHTML = Object.keys(monthly)
        .sort()
        .map(m => `<div class="bg-white p-2 rounded">\( {m} — <strong> \){monthly[m]}</strong> днів</div>`)
        .join('');

      document.getElementById('stats').innerHTML = `
        <div class="text-2xl font-bold text-blue-600">${totalDays} робочих днів</div>
        <div class="mt-4 grid grid-cols-2 gap-3 text-sm">${monthlyHTML}</div>
      `;

      const events = days.map(date => ({
        title: '✅ Робочий день',
        start: date,
        allDay: true,
        color: '#10b981',
        textColor: 'white'
      }));

      calendar.removeAllEvents();
      calendar.addEventSource(events);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Tailwind
      document.documentElement.style.setProperty('--tw-ring-color', '#3b82f6');

      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'uk',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth'
        },
        height: 'auto',
        events: [],

        dateClick: async function(info) {
          const pass = prompt('Введи пароль для зміни (тільки Сергій):');
          if (pass !== '2026') {  // ← ЗМІНИ НА СВІЙ ПАРОЛЬ!
            alert('Неправильний пароль');
            return;
          }

          const exists = confirm(`Зробити ${info.dateStr} робочим днем?\n(OK = додати, Скасувати = видалити)`);

          try {
            if (exists) {
              await supabase.from('work_days').upsert({ date: info.dateStr });
            } else {
              await supabase.from('work_days').delete().eq('date', info.dateStr);
            }
            await fetchAndRender();
          } catch (err) {
            alert('Помилка збереження: ' + err.message);
            console.error(err);
          }
        }
      });

      calendar.render();
      await fetchAndRender();
    });
  </script>
</head>
<body class="bg-gray-100 py-8">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-center text-blue-700 mb-8">Мій робочий графік (Сергій)</h1>
    
    <div id="stats" class="bg-white rounded-2xl shadow-xl p-8 mb-8 text-center"></div>
    
    <div id="calendar" class="bg-white rounded-3xl shadow-2xl p-6"></div>
  </div>
</body>
</html>
