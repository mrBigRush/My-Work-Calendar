<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalendarz Pracy | Serhii Kolomiiets</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales-all.global.min.js"></script>

    <style>
        .fc { max-height: 70vh; font-size: 0.9rem; }
        .type-work { background-color: #10b981 !important; border-radius: 4px; border: none !important; }
        .type-vacation { background-color: #3b82f6 !important; border-radius: 4px; border: none !important; }
        .type-sick { background-color: #ef4444 !important; border-radius: 4px; border: none !important; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        body.is-admin .fc-highlight { background: rgba(16, 185, 129, 0.2) !important; }
        .fc-toolbar-title { font-size: 1.1rem !important; font-weight: 700 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-all">

    <div class="max-w-4xl mx-auto px-2 py-4 sm:py-6">
        <div class="flex justify-between items-center mb-6 bg-white p-3 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 id="main-title" class="text-base sm:text-lg font-bold text-slate-800 leading-tight">Serhii Kolomiiets</h1>
                <span id="admin-badge" class="admin-only text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold uppercase tracking-wider">Admin</span>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="generateReport()" class="bg-blue-50 text-blue-600 p-2 rounded-xl hover:bg-blue-100 transition" title="Report">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </button>
                <select onchange="changeLang(this.value)" id="lang-select" class="text-xs border-none bg-slate-100 rounded-xl px-2 py-2 outline-none font-semibold">
                    <option value="pl">PL</option>
                    <option value="uk">UA</option>
                </select>
                <button id="login-btn" onclick="handleAuth()" class="text-xs font-bold px-4 py-2 rounded-xl bg-slate-800 text-white hover:bg-slate-700 transition">Login</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4 text-center font-bold uppercase tracking-tighter">
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-emerald-100">
                <p id="label-work" class="text-[10px] text-emerald-600">Praca</p>
                <p id="stat-work" class="text-2xl text-emerald-700">0</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-blue-100">
                <p id="label-vacation" class="text-[10px] text-blue-600">Urlop</p>
                <p id="stat-vacation" class="text-2xl text-blue-700">0</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-red-100">
                <p id="label-sick" class="text-[10px] text-red-600">Choroba</p>
                <p id="stat-sick" class="text-2xl text-red-700">0</p>
            </div>
        </div>

        <div class="bg-white p-2 sm:p-4 rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <div id="calendar"></div>
        </div>

        <p id="hint-box" class="mt-4 text-center text-slate-400 text-[11px] italic"></p>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = 'https://unyztaiglminylhbinsy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXp0YWlnbG1pbnlsaGJpbnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjUwMzQsImV4cCI6MjA4OTEwMTAzNH0.aD-HFhE9XnPM_V0TBz7UJ_7lBGszSj0olz1CSkmcw_k';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = '2026';

        const i18n = {
            pl: { 
                title: "Kalendarz: Serhii Kolomiiets", work: "Praca", vacation: "Urlop", sick: "Choroba", 
                login: "Zaloguj", logout: "Wyloguj", hint: "Widok podglądu", hintAdmin: "Zaznacz dni, aby edytować", 
                choice: "Wybierz:\n1-Praca, 2-Urlop, 3-Choroba, 0-Usuń", passMsg: "Hasło:",
                reportHeader: "Podsumowanie pracy: Serhii Kolomiiets", reportCopied: "Raport skopiowany do schowka!"
            },
            uk: { 
                title: "Календар: Сергій Коломієць", work: "Робота", vacation: "Відпустка", sick: "Хвороба", 
                login: "Увійти", logout: "Вийти", hint: "Режим перегляду", hintAdmin: "Виділіть дні для редагування", 
                choice: "Оберіть:\n1-Робота, 2-Відпустка, 3-Хвороба, 0-Видалити", passMsg: "Пароль:",
                reportHeader: "Звіт по роботі: Сергій Коломієць", reportCopied: "Звіт скопійовано!"
            }
        };

        let currentLang = 'pl';
        let isAdmin = localStorage.getItem('isSergAdmin') === 'true';

        // Генерація звіту
        window.generateReport = () => {
            const date = window.calendar.getDate();
            const monthName = date.toLocaleString(currentLang, { month: 'long', year: 'numeric' });
            const w = document.getElementById('stat-work').innerText;
            const v = document.getElementById('stat-vacation').innerText;
            const s = document.getElementById('stat-sick').innerText;

            const report = `📊 ${i18n[currentLang].reportHeader}\n📅 ${monthName}\n------------------\n✅ ${i18n[currentLang].work}: ${w}\n🌴 ${i18n[currentLang].vacation}: ${v}\n🏥 ${i18n[currentLang].sick}: ${s}`;
            
            navigator.clipboard.writeText(report).then(() => {
                alert(i18n[currentLang].reportCopied + "\n\n" + report);
            });
        };

        window.handleAuth = () => {
            if (isAdmin) { localStorage.removeItem('isSergAdmin'); location.reload(); }
            else {
                const p = prompt(i18n[currentLang].passMsg);
                if (p === ADMIN_PASS) { localStorage.setItem('isSergAdmin', 'true'); location.reload(); }
                else if(p !== null) alert("Error!");
            }
        };

        window.changeLang = (lang) => {
            currentLang = lang;
            document.getElementById('main-title').innerText = i18n[lang].title;
            document.getElementById('label-work').innerText = i18n[lang].work;
            document.getElementById('label-vacation').innerText = i18n[lang].vacation;
            document.getElementById('label-sick').innerText = i18n[lang].sick;
            document.getElementById('login-btn').innerText = isAdmin ? i18n[lang].logout : i18n[lang].login;
            document.getElementById('hint-box').innerText = isAdmin ? i18n[lang].hintAdmin : i18n[lang].hint;
            window.calendar.setOption('locale', lang);
            window.calendar.refetchEvents();
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (isAdmin) document.body.classList.add('is-admin');
            const calendarEl = document.getElementById('calendar');
            window.calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: currentLang,
                firstDay: 1,
                selectable: isAdmin,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                datesSet: () => refreshStats(),
                events: async function(info, successCallback) {
                    const { data } = await supabase.from('work_days').select('*');
                    window.allFileData = data || [];
                    refreshStats();
                    successCallback(window.allFileData.map(d => ({
                        title: i18n[currentLang][d.type] || d.type,
                        start: d.date,
                        allDay: true,
                        className: `type-${d.type}`
                    })));
                },
                select: async function(selectionInfo) {
                    if (!isAdmin) return;
                    const choice = prompt(i18n[currentLang].choice);
                    const typesMap = { '1': 'work', '2': 'vacation', '3': 'sick', '0': 'delete' };
                    const typeKey = typesMap[choice];
                    if (!typeKey) { window.calendar.unselect(); return; }
                    let dates = [];
                    let curr = new Date(selectionInfo.start);
                    let end = new Date(selectionInfo.end);
                    while (curr < end) {
                        dates.push(curr.toISOString().split('T')[0]);
                        curr.setDate(curr.getDate() + 1);
                    }
                    if (typeKey === 'delete') await supabase.from('work_days').delete().in('date', dates);
                    else await supabase.from('work_days').upsert(dates.map(d => ({ date: d, type: typeKey })));
                    window.calendar.unselect();
                    window.calendar.refetchEvents();
                }
            });
            window.calendar.render();
            window.changeLang(currentLang);
        });

        function refreshStats() {
            if (!window.allFileData || !window.calendar) return;
            const viewDate = window.calendar.getDate(); 
            const m = viewDate.getMonth(), y = viewDate.getFullYear();
            const counts = { work: 0, vacation: 0, sick: 0 };
            window.allFileData.forEach(item => {
                const d = new Date(item.date);
                if (d.getMonth() === m && d.getFullYear() === y) counts[item.type]++;
            });
            document.getElementById('stat-work').innerText = counts.work;
            document.getElementById('stat-vacation').innerText = counts.vacation;
            document.getElementById('stat-sick').innerText = counts.sick;
        }
    </script>
</body>
</html>
