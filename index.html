<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Робочий календар Сергія</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/uk.global.min.js"></script>

    <style>
        :root { --fc-today-bg-color: #fefce8; }
        .fc { max-height: 75vh; font-size: 0.9rem; }
        @media (max-width: 640px) { .fc { font-size: 0.75rem; } .fc-toolbar-title { font-size: 1.1rem !important; } }
        .fc-event { border: none !important; cursor: pointer; transition: opacity 0.2s; }
        .fc-event:hover { opacity: 0.8; }
        .type-work { background-color: #10b981 !important; }
        .type-vacation { background-color: #3b82f6 !important; }
        .type-sick { background-color: #ef4444 !important; }
        /* Стиль для виділення */
        .fc-highlight { background: rgba(59, 130, 246, 0.3) !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-4xl mx-auto px-2 sm:px-4 py-4 sm:py-6">
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="bg-white p-2 rounded-xl shadow-sm border border-emerald-100 text-center">
                <p class="text-[10px] font-bold text-emerald-600 uppercase">Робота</p>
                <p id="stat-work" class="text-xl font-black text-emerald-700">0</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-blue-100 text-center">
                <p class="text-[10px] font-bold text-blue-600 uppercase">Відпустка</p>
                <p id="stat-vacation" class="text-xl font-black text-blue-700">0</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-red-100 text-center">
                <p class="text-[10px] font-bold text-red-600 uppercase">Хвороба</p>
                <p id="stat-sick" class="text-xl font-black text-red-700">0</p>
            </div>
        </div>

        <div class="bg-white p-2 sm:p-4 rounded-2xl shadow-xl border border-slate-200">
            <div id="calendar"></div>
        </div>

        <div class="mt-4 p-3 bg-amber-50 rounded-lg border border-amber-100 text-[11px] sm:text-xs text-amber-800">
            <strong>Як користуватись:</strong> Виділіть один або кілька днів (проведіть пальцем/мишкою), щоб змінити їх статус. Статистика рахує дні тільки вибраного місяця.
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = 'https://unyztaiglminylhbinsy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXp0YWlnbG1pbnlsaGJpbnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjUwMzQsImV4cCI6MjA4OTEwMTAzNH0.aD-HFhE9XnPM_V0TBz7UJ_7lBGszSj0olz1CSkmcw_k';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = '2026';

        const types = {
            '1': { id: 'work', label: 'Робочий' },
            '2': { id: 'vacation', label: 'Відпустка' },
            '3': { id: 'sick', label: 'Лікарняний' },
            '0': { id: 'delete', label: 'Видалити' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            window.calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'uk',
                firstDay: 1,
                selectable: true, // Вмикаємо можливість вибору діапазону
                unselectAuto: true,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                
                datesSet: () => refreshStats(),
                
                events: async function(info, successCallback) {
                    const { data } = await supabase.from('work_days').select('*');
                    if (data) {
                        window.allFileData = data;
                        refreshStats();
                        successCallback(data.map(d => ({
                            title: types[Object.keys(types).find(k => types[k].id === d.type)]?.label || 'Робота',
                            start: d.date,
                            allDay: true,
                            className: `type-${d.type}`
                        })));
                    }
                },

                // Обробка вибору одного або кількох днів
                select: async function(selectionInfo) {
                    const pass = prompt('Пароль для редагування:');
                    if (pass !== ADMIN_PASS) {
                        window.calendar.unselect();
                        return;
                    }

                    const choice = prompt('Оберіть статус для вибраних днів:\n1 - Робочий\n2 - Відпустка\n3 - Лікарняний\n0 - Видалити');
                    const selected = types[choice];

                    if (!selected) {
                        window.calendar.unselect();
                        return;
                    }

                    // Отримуємо масив дат між початком і кінцем вибору
                    let dates = [];
                    let curr = new Date(selectionInfo.startStr);
                    let end = new Date(selectionInfo.endStr);
                    
                    while (curr < end) {
                        dates.push(new Date(curr).toISOString().split('T')[0]);
                        curr.setDate(curr.getDate() + 1);
                    }

                    if (selected.id === 'delete') {
                        await supabase.from('work_days').delete().in('date', dates);
                    } else {
                        const upsertData = dates.map(d => ({ date: d, type: selected.id }));
                        await supabase.from('work_days').upsert(upsertData);
                    }

                    window.calendar.unselect();
                    window.calendar.refetchEvents();
                }
            });
            window.calendar.render();
        });

        function refreshStats() {
            if (!window.allFileData || !window.calendar) return;
            const currentViewDate = window.calendar.getDate(); 
            const currentMonth = currentViewDate.getMonth();
            const currentYear = currentViewDate.getFullYear();

            const counts = { work: 0, vacation: 0, sick: 0 };
            window.allFileData.forEach(item => {
                const d = new Date(item.date);
                if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                    counts[item.type]++;
                }
            });

            document.getElementById('stat-work').innerText = counts.work;
            document.getElementById('stat-vacation').innerText = counts.vacation;
            document.getElementById('stat-sick').innerText = counts.sick;
        }
    </script>
</body>
</html>
