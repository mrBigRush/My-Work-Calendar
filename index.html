<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalendarz Pracy Sergiusza</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales-all.global.min.js"></script>

    <style>
        :root { --fc-today-bg-color: #fefce8; }
        .fc { max-height: 75vh; font-size: 0.9rem; }
        @media (max-width: 640px) { .fc { font-size: 0.75rem; } .fc-toolbar-title { font-size: 1.1rem !important; } }
        .fc-event { border: none !important; cursor: pointer; }
        .type-work { background-color: #10b981 !important; }
        .type-vacation { background-color: #3b82f6 !important; }
        .type-sick { background-color: #ef4444 !important; }
        .fc-highlight { background: rgba(59, 130, 246, 0.3) !important; }
        .lang-btn.active { background-color: #1e293b; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-4xl mx-auto px-2 sm:px-4 py-4 sm:py-6">
        <div class="flex justify-between items-center mb-6">
            <h1 id="main-title" class="text-xl font-bold text-slate-800">Kalendarz Pracy</h1>
            <div class="flex gap-2 bg-white p-1 rounded-lg shadow-sm border border-slate-200">
                <button onclick="changeLang('pl')" id="btn-pl" class="lang-btn px-3 py-1 text-xs rounded-md font-bold active">PL</button>
                <button onclick="changeLang('uk')" id="btn-uk" class="lang-btn px-3 py-1 text-xs rounded-md font-bold">UA</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="bg-white p-2 rounded-xl shadow-sm border border-emerald-100 text-center">
                <p id="label-work" class="text-[10px] font-bold text-emerald-600 uppercase">Praca</p>
                <p id="stat-work" class="text-xl font-black text-emerald-700">0</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-blue-100 text-center">
                <p id="label-vacation" class="text-[10px] font-bold text-blue-600 uppercase">Urlop</p>
                <p id="stat-vacation" class="text-xl font-black text-blue-700">0</p>
            </div>
            <div class="bg-white p-2 rounded-xl shadow-sm border border-red-100 text-center">
                <p id="label-sick" class="text-[10px] font-bold text-red-600 uppercase">Choroba</p>
                <p id="stat-sick" class="text-xl font-black text-red-700">0</p>
            </div>
        </div>

        <div class="bg-white p-2 sm:p-4 rounded-2xl shadow-xl border border-slate-200">
            <div id="calendar"></div>
        </div>

        <div id="hint-box" class="mt-4 p-3 bg-slate-100 rounded-lg text-[11px] text-slate-600">
            Zaznacz dni, aby zmienić status. Statystyki dotyczą wybranego miesiąca.
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = 'https://unyztaiglminylhbinsy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXp0YWlnbG1pbnlsaGJpbnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjUwMzQsImV4cCI6MjA4OTEwMTAzNH0.aD-HFhE9XnPM_V0TBz7UJ_7lBGszSj0olz1CSkmcw_k';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = '2026';

        const i18n = {
            pl: {
                title: "Kalendarz Pracy Sergiusza",
                work: "Praca", vacation: "Urlop", sick: "Choroba", delete: "Usuń",
                promptPass: "Wpisz hasło:", promptChoice: "Wybierz status:\n1 - Praca\n2 - Urlop\n3 - Choroba\n0 - Usuń",
                hint: "Zaznacz dni, aby zmienić status. Statystyki dotyczą wybranego miesiąca.",
                today: "Dzisiaj"
            },
            uk: {
                title: "Робочий календар Сергія",
                work: "Робота", vacation: "Відпустка", sick: "Лікарняний", delete: "Видалити",
                promptPass: "Введіть пароль:", promptChoice: "Оберіть статус:\n1 - Робочий\n2 - Відпустка\n3 - Лікарняний\n0 - Видалити",
                hint: "Виділіть дні, щоб змінити статус. Статистика рахує дні вибраного місяця.",
                today: "Сьогодні"
            }
        };

        let currentLang = 'pl';

        window.changeLang = (lang) => {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            
            // Оновлення тексту
            document.getElementById('main-title').innerText = i18n[lang].title;
            document.getElementById('label-work').innerText = i18n[lang].work;
            document.getElementById('label-vacation').innerText = i18n[lang].vacation;
            document.getElementById('label-sick').innerText = i18n[lang].sick;
            document.getElementById('hint-box').innerText = i18n[lang].hint;

            // Оновлення календаря
            window.calendar.setOption('locale', lang);
            window.calendar.setOption('buttonText', { today: i18n[lang].today });
            window.calendar.refetchEvents();
        };

        const types = {
            '1': 'work',
            '2': 'vacation',
            '3': 'sick',
            '0': 'delete'
        };

        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            window.calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pl',
                firstDay: 1,
                selectable: true,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                
                datesSet: () => refreshStats(),
                
                events: async function(info, successCallback) {
                    const { data } = await supabase.from('work_days').select('*');
                    window.allFileData = data || [];
                    refreshStats();
                    successCallback(window.allFileData.map(d => ({
                        title: i18n[currentLang][d.type],
                        start: d.date,
                        allDay: true,
                        className: `type-${d.type}`
                    })));
                },

                select: async function(selectionInfo) {
                    const pass = prompt(i18n[currentLang].promptPass);
                    if (pass !== ADMIN_PASS) { window.calendar.unselect(); return; }

                    const choice = prompt(i18n[currentLang].promptChoice);
                    const typeKey = types[choice];

                    if (!typeKey) { window.calendar.unselect(); return; }

                    let dates = [];
                    let curr = new Date(selectionInfo.start);
                    let end = new Date(selectionInfo.end);
                    while (curr < end) {
                        dates.push(curr.toISOString().split('T')[0]);
                        curr.setDate(curr.getDate() + 1);
                    }

                    if (typeKey === 'delete') {
                        await supabase.from('work_days').delete().in('date', dates);
                    } else {
                        await supabase.from('work_days').upsert(dates.map(d => ({ date: d, type: typeKey })));
                    }

                    window.calendar.unselect();
                    window.calendar.refetchEvents();
                }
            });
            window.calendar.render();
            window.changeLang('pl'); // Встановлюємо польську при старті
        });

        function refreshStats() {
            if (!window.allFileData || !window.calendar) return;
            const viewDate = window.calendar.getDate(); 
            const m = viewDate.getMonth();
            const y = viewDate.getFullYear();

            const counts = { work: 0, vacation: 0, sick: 0 };
            window.allFileData.forEach(item => {
                const d = new Date(item.date);
                if (d.getMonth() === m && d.getFullYear() === y) {
                    counts[item.type]++;
                }
            });

            document.getElementById('stat-work').innerText = counts.work;
            document.getElementById('stat-vacation').innerText = counts.vacation;
            document.getElementById('stat-sick').innerText = counts.sick;
        }
    </script>
</body>
</html>
