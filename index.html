<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Робочий календар Сергія</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/uk.global.min.js"></script>

    <style>
        .fc { max-height: 70vh; font-size: 0.85rem; }
        @media (min-width: 768px) { .fc { font-size: 1rem; } }
        .fc-event { border: none !important; cursor: pointer; }
        .type-work { background-color: #10b981 !important; }    /* Зелений */
        .type-vacation { background-color: #3b82f6 !important; } /* Синій */
        .type-sick { background-color: #ef4444 !important; }     /* Червоний */
        .fc-daygrid-day-number { padding: 4px !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div class="max-w-4xl mx-auto px-2 sm:px-4 py-4 sm:py-8">
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="bg-white p-2 sm:p-4 rounded-xl shadow-sm border border-emerald-100 text-center">
                <p class="text-[10px] sm:text-xs text-emerald-600 font-bold uppercase">Робота</p>
                <p id="stat-work" class="text-xl sm:text-2xl font-black text-emerald-700">0</p>
            </div>
            <div class="bg-white p-2 sm:p-4 rounded-xl shadow-sm border border-blue-100 text-center">
                <p class="text-[10px] sm:text-xs text-blue-600 font-bold uppercase">Відпустка</p>
                <p id="stat-vacation" class="text-xl sm:text-2xl font-black text-blue-700">0</p>
            </div>
            <div class="bg-white p-2 sm:p-4 rounded-xl shadow-sm border border-red-100 text-center">
                <p class="text-[10px] sm:text-xs text-red-600 font-bold uppercase">Лікарняні</p>
                <p id="stat-sick" class="text-xl sm:text-2xl font-black text-red-700">0</p>
            </div>
        </div>

        <div class="bg-white p-2 sm:p-6 rounded-2xl shadow-xl border border-slate-200">
            <div id="calendar"></div>
        </div>

        <div class="mt-4 p-4 bg-blue-50 rounded-lg border border-blue-100 text-xs text-blue-800">
            💡 <strong>Порада:</strong> Натисніть на дату, щоб змінити статус. Статистика зверху рахується лише для місяця, який ви зараз переглядаєте.
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const SUPABASE_URL = 'https://unyztaiglminylhbinsy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVueXp0YWlnbG1pbnlsaGJpbnN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjUwMzQsImV4cCI6MjA4OTEwMTAzNH0.aD-HFhE9XnPM_V0TBz7UJ_7lBGszSj0olz1CSkmcw_k';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_PASS = '2026';

        const types = {
            '1': { id: 'work', label: 'Робочий', class: 'type-work' },
            '2': { id: 'vacation', label: 'Відпустка', class: 'type-vacation' },
            '3': { id: 'sick', label: 'Лікарняний', class: 'type-sick' },
            '0': { id: 'delete', label: 'Видалити запис', class: '' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            window.calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'uk',
                firstDay: 1,
                handleWindowResize: true,
                contentHeight: 'auto',
                headerToolbar: {
                    left: 'prev,next',
                    center: 'title',
                    right: 'today'
                },
                events: async function(info, successCallback) {
                    const { data } = await supabase.from('work_days').select('*');
                    
                    // Фільтруємо дані для статистики саме за поточним видимим місяцем
                    updateMonthStats(data, info.start, info.end);

                    successCallback(data.map(d => ({
                        title: types[Object.keys(types).find(k => types[k].id === d.type)]?.label || 'Робота',
                        start: d.date,
                        className: `type-${d.type}`
                    })));
                },
                dateClick: async (info) => {
                    const pass = prompt('Пароль:');
                    if (pass !== ADMIN_PASS) return;

                    const choice = prompt('Оберіть статус:\n1 - Робочий\n2 - Відпустка\n3 - Лікарняний\n0 - Видалити');
                    const selected = types[choice];

                    if (!selected) return;

                    if (selected.id === 'delete') {
                        await supabase.from('work_days').delete().eq('date', info.dateStr);
                    } else {
                        await supabase.from('work_days').upsert({ date: info.dateStr, type: selected.id });
                    }
                    window.calendar.refetchEvents();
                }
            });
            window.calendar.render();
        });

        function updateMonthStats(allData, viewStart, viewEnd) {
            const counts = { work: 0, vacation: 0, sick: 0 };
            
            allData.forEach(item => {
                const d = new Date(item.date);
                // Перевірка, чи входить дата в діапазон поточного вікна календаря
                if (d >= viewStart && d < viewEnd) {
                    counts[item.type]++;
                }
            });

            document.getElementById('stat-work').innerText = counts.work;
            document.getElementById('stat-vacation').innerText = counts.vacation;
            document.getElementById('stat-sick').innerText = counts.sick;
        }
    </script>
</body>
</html>
